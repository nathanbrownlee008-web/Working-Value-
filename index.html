<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Top Daily Tips</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="styles.css?v=1772491881"/>
</head>
<body>

<header class="main-header">
<h1 class="logo-3d">Top Daily Tips</h1>
<div class="tabs">
<button id="tabBets" class="active">Value Bets</button>
<button id="tabTracker">Tracker</button>
<button id="tabHistory">Daily History</button>
</div>
</header>

<section id="betsSection">
<div id="paywallBanner" class="paywall-banner" style="display:none;"></div>
<div id="betsGrid" class="bets-grid"></div>
</section>

<section id="trackerSection" style="display:none;">

<div class="bankroll-section">
  <div class="bankroll-row">
    <label>Starting Bankroll</label>
    <input type="number" id="startingBankroll" value="290" />
    <button onclick="exportCSV()">Export CSV</button>
  </div>
</div>

<div class="stats-grid">
<div class="stat-card">Bankroll<br><strong>£<span id="bankroll">0</span></strong></div>
<div class="stat-card" id="profitCard">Profit<br><strong>£<span id="profit">0</span></strong></div>
<div class="stat-card">ROI<br><strong><span id="roi">0</span>%</strong></div>
<div class="stat-card">Win Rate<br><strong><span id="winrate">0</span>%</strong></div>
<div class="stat-card">Won - Lost<br><strong><span id="wonLost">0-0</span></strong></div>
<div class="stat-card">Staked<br><strong>£<span id="totalStakedCard">0</span></strong></div>
<div class="stat-card">Avg Odds<br><strong><span id="avgOdds">0</span></strong></div>
<div class="stat-card">Total Bets<br><strong><span id="totalBets">0</span></strong></div>
</div>

<div class="chart-tabs">
  <button class="tab-btn active" data-tab="daily">Daily</button>
  <button class="tab-btn" data-tab="monthly">Monthly</button>
  <button class="tab-btn" data-tab="market">Markets</button>
</div>

<div class="chart-wrap">
  <div class="chart-pane active" id="pane-daily">
    <canvas id="chart"></canvas>
  </div>
  <div class="chart-pane" id="pane-monthly">
  <canvas id="monthlyChart"></canvas>

  <div class="monthly-breakdown">
    <div class="monthly-toggle" onclick="toggleMonthly()">
      📊 Monthly Breakdown
      <span id="monthlyArrow">▼</span>
    </div>

    <div id="monthlyWrapper" class="collapsed">
      <div id="monthlyTable"></div>
    </div>
  </div>

</div>
  <div class="chart-pane" id="pane-market">
    <canvas id="marketChart"></canvas>
  </div>
</div>

<div class="tracker-history">
  <div class="tracker-toggle" onclick="toggleTracker()">
    📈 Bet Results (<span id="betCount">0</span>)
    <span id="trackerArrow">▼</span>
  </div>
  <div id="trackerWrapper" class="collapsed">
    <div id="trackerTable"></div>
  </div>
</div>

</section>

<section id="historySection" style="display:none;">
  <!-- History shows all days stacked; tap a day to expand/collapse. -->
  <div id="historySummary" class="history-summary"></div>
  <div id="historyList" class="bets-grid history-grid"></div>
</section>

<script src="app.js?v=1772491881"></script>
<div id="authModal" class="auth-modal" style="display:none;" aria-hidden="true">
  <div class="auth-modal-backdrop" data-close="1"></div>
  <div class="auth-modal-card" role="dialog" aria-modal="true" aria-label="Login">
    <div class="auth-modal-head">
      <div>
        <div class="auth-title">Subscriber Login</div>
        <div class="auth-sub">Log in to unlock Tracker, History, and all bets.</div>
      </div>
      <button id="authClose" class="auth-x" aria-label="Close">✕</button>
    </div>

    <div class="auth-row">
      <label class="auth-label" for="authEmail">Email</label>
      <input id="authEmail" class="auth-input" type="email" autocomplete="email" placeholder="you@example.com"/>
    </div>

    <div class="auth-row">
      <label class="auth-label" for="authPassword">Password</label>
      <input id="authPassword" class="auth-input" type="password" autocomplete="current-password" placeholder="••••••••"/>
    </div>

    <div class="auth-actions">
      <button id="btnLogin" class="auth-btn primary">Log in</button>
      <button id="btnSignup" class="auth-btn">Sign up</button>
      <button id="btnMagic" class="auth-btn">Magic link</button>
    </div>

    <div id="authMsg" class="auth-msg" aria-live="polite"></div>

    <div class="auth-divider"></div>
    <div class="auth-foot">
      <button id="btnLogout" class="auth-link" style="display:none;">Log out</button>
    </div>
  </div>
</div>
</body>
</html>
